name: nricp-dev
channels:
  - conda-forge
  - defaults
dependencies:
  - python==3.12  # 3.13 seems to solve super slowly

  # dev
  - pytest
  - typing_extensions
  - pyclean
  - tbb-devel
  - cmake
  - ninja

  # core science packages
  - numpy
  - scipy

  # numerical methods
  - pymatsolver >= 0.4
  # - pydiso  # only works with intel CPU
  - python-mumps

  # csv, fileio, and data handling
  - openpyxl
  - pandas
  - zstandard # compression for writing xml files

  # progress monitoring
  - rich
  - tqdm

  # mesh requirements
  - meshio >=5
  - vtk >= 9.5
  - pyvista >= 0.46.1 # helper for vtk
  - pyvistaqt
  - pyacvd

  # plotting and display
  - matplotlib
  - colorcet
  - tabulate
  - glib # pyvista rendering
  - imageio-ffmpeg # pyvista rendering
  # - xvfbwrapper # pyvista rendering on linux
  - trame # for pyvista
  - pyvistaqt
  - opencv # image tools

  # parallel
  - psutil # for checking core counts
